# Core draft storage defaults. Replace or remove if the project uses DB-backed storage adapters.
screenbuilder.storage.root=var/screenbuilder
screenbuilder.storage.drafts-dir=${screenbuilder.storage.root}/drafts
screenbuilder.storage.history-dir=${screenbuilder.storage.root}/history
screenbuilder.storage.summary-dir=${screenbuilder.storage.root}/status-summary
screenbuilder.storage.legacy-registry-file=${screenbuilder.storage.root}/component-registry.json

# Project adapter identifiers.
screenbuilder.project.project-id=example-main
screenbuilder.project.menu-root=PMENU1
screenbuilder.project.runtime-class=PROJECT
screenbuilder.project.menu-scope=PROJECT_RUNTIME

# Artifact and runtime naming defaults.
screenbuilder.project.builder-id-prefix=builder
screenbuilder.project.release-unit-prefix=example-release
screenbuilder.project.runtime-package-prefix=screenbuilder-runtime-example
screenbuilder.project.compare-baseline=CURRENT_RUNTIME
