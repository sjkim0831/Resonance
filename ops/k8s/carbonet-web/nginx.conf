pid /tmp/nginx.pid;
events { worker_connections 2048; }
http {
  include /etc/nginx/mime.types;
  types { application/javascript mjs; }
  default_type application/octet-stream;
  map $uri $react_asset_cache_control {
    default "public, max-age=31536000, immutable";
    ~*\.mjs$ "no-cache, no-store, max-age=0, must-revalidate";
  }
  access_log /dev/stdout;
  error_log /dev/stderr warn;
  sendfile on;
  keepalive_timeout 65;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  upstream carbonet_api {
    server carbonet-api.carbonet-prod.svc.cluster.local:8080;
    keepalive 64;
  }

  server {
    listen 8080;
    server_name _;
    root /srv;

    location ^~ /assets/react/ {
      alias /srv/react-app/;
      try_files $uri @carbonet_api;
      add_header X-Carbonet-Served-By "carbonet-web" always;
      add_header Cache-Control $react_asset_cache_control always;
    }

    location ~ ^/(download|downloads|error|img)/ {
      root /srv/public;
      try_files $uri @carbonet_api;
      add_header X-Carbonet-Served-By "carbonet-web" always;
    }

    location ^~ /react-app/ {
      try_files $uri @carbonet_api;
      add_header Cache-Control "no-cache" always;
    }

    location ~* ^/react-app/assets/.+\.[a-z0-9]+$ {
      try_files $uri @carbonet_api;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location @carbonet_api {
      proxy_pass http://carbonet_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://carbonet_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
