pid /tmp/nginx.pid;
events { worker_connections 2048; }
http {
  include /etc/nginx/mime.types;
  types { application/javascript mjs; }
  default_type application/octet-stream;
  map $uri $react_asset_cache_control {
    default "public, max-age=31536000, immutable";
    ~*\.mjs$ "no-cache, no-store, max-age=0, must-revalidate";
  }
  access_log /dev/stdout;
  error_log /dev/stderr warn;
  sendfile on;
  keepalive_timeout 65;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  upstream carbonet_api {
    server carbonet-api.carbonet-prod.svc.cluster.local:8080;
    keepalive 64;
  }

  server {
    listen 8080;
    server_name _;
    root /srv;

    location ^~ /assets/react/ {
      alias /srv/react-app/;
      try_files $uri @carbonet_api;
      add_header X-Carbonet-Served-By "carbonet-web" always;
      add_header Cache-Control $react_asset_cache_control always;
    }

    location ~ ^/(download|downloads|error|img)/ {
      root /srv/public;
      try_files $uri @carbonet_api;
      add_header X-Carbonet-Served-By "carbonet-web" always;
    }

    location ^~ /react-app/ {
      try_files $uri @carbonet_api;
      add_header Cache-Control "no-cache" always;
    }

    location ~* ^/react-app/assets/.+\.[a-z0-9]+$ {
      try_files $uri @carbonet_api;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Governed SPA routes are generated from screen contracts and must survive direct navigation.
    # API and asset paths remain outside this allowlist and continue to the backend unchanged.
    location ~ ^/(en/)?(generated/|work/|ccus/facility/) {
      try_files /react-app/index.html @carbonet_api;
      add_header X-Carbonet-Served-By "carbonet-web-spa-fallback" always;
      add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
    }

    # Stable Omniverse entry point: bypasses the generated React route registry.
    location = /admin/system/omniverse {
      return 302 /admin/system/omniverse/;
    }

    location ^~ /admin/system/omniverse/ {
      proxy_pass http://172.16.1.232:5173/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ^~ /admin/api/omniverse/assets {
      client_max_body_size 2g;
      proxy_request_buffering off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_pass http://carbonet_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      error_page 413 = @omniverse_payload_too_large;
    }

    location @omniverse_payload_too_large {
      default_type application/json;
      return 413 '{"status":"TOO_LARGE","message":"업로드 파일은 2GB를 초과할 수 없습니다."}';
    }

    location @carbonet_api {
      proxy_pass http://carbonet_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://carbonet_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
