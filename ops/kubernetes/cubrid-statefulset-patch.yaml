# CUBRID StatefulSet - 자동 복원 패치
# 적용: kubectl apply -f cubrid-statefulset-patch.yaml
spec:
  template:
    spec:
      initContainers:
      - name: cubrid-init
        image: kubosh/cubrid-init:1.0
        command: ["/bin/bash", "/init-cubrid.sh"]
        volumeMounts:
        - name: cubrid-init
          mountPath: /init-cubrid.sh
          subPath: init-cubrid.sh
        - name: cubrid-config
          mountPath: /hostpath-data
        securityContext:
          runAsUser: 0
      containers:
      - name: cubrid
        volumeMounts:
        - name: cubrid-config
          mountPath: /hostpath-data
      volumes:
      - name: cubrid-init
        configMap:
          name: cubrid-init-script
          defaultMode: 0755
      - name: cubrid-config
        hostPath:
          path: /opt/Resonance/data/cubrid
          type: DirectoryOrCreate
