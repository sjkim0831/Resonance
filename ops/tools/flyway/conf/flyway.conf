# Flyway Configuration for CUBRID
# https://flywaydb.org/documentation/

flyway.url=jdbc:cubrid:${CUBRID_HOST:127.0.0.1}:33000:carbonet:::?charset=UTF-8
flyway.user=dba
flyway.password=

# Locations of migration files
flyway.locations=filesystem:db/migrations,classpath:db/migrations

# Migration table
flyway.table=db_migration_history

# Baseline
flyway.baselineOnMigrate=true
flyway.baselineVersion=1.0

# Clean
flyway.cleanDisabled=true

# Driver
flyway.driver=cubrid.jdbc.driver.CUBRIDDriver

# Encoding
flyway.encoding=UTF-8

# Out of order
flyway.outOfOrder=false

# Validate
flyway.validateOnMigrate=true