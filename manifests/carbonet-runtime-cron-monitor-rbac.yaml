apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carbonet-runtime-cron-monitor-reader
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carbonet-runtime-cron-monitor-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: carbonet-prod
roleRef:
  kind: ClusterRole
  name: carbonet-runtime-cron-monitor-reader
  apiGroup: rbac.authorization.k8s.io
