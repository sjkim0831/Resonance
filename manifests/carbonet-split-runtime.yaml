apiVersion: v1
kind: Service
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    project: carbonet
spec:
  type: ClusterIP
  selector:
    app: carbonet-runtime
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: carbonet-api
  namespace: carbonet-prod
  labels:
    app: carbonet-api
    project: carbonet
spec:
  selector:
    app: carbonet-runtime
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carbonet-web-nginx
  namespace: carbonet-prod
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events { worker_connections 2048; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      error_log /dev/stderr warn;
      sendfile on;
      keepalive_timeout 65;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;

      upstream carbonet_api {
        server carbonet-api.carbonet-prod.svc.cluster.local:8080;
        keepalive 64;
      }

      server {
        listen 8080;
        server_name _;
        root /srv;

        location ^~ /assets/react/ {
          alias /srv/react-app/;
          try_files $uri @carbonet_api;
          add_header X-Carbonet-Served-By "carbonet-web" always;
          add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location ^~ /react-app/ {
          try_files $uri @carbonet_api;
          add_header Cache-Control "no-cache" always;
        }

        location ~* ^/react-app/assets/.+\.[a-z0-9]+$ {
          try_files $uri @carbonet_api;
          add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location @carbonet_api {
          proxy_pass http://carbonet_api;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
          proxy_pass http://carbonet_api;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbonet-web
  namespace: carbonet-prod
  labels:
    app: carbonet-web
    project: carbonet
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: carbonet-web
  template:
    metadata:
      labels:
        app: carbonet-web
        project: carbonet
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: web
        image: nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
        command: ["nginx", "-c", "/etc/carbonet/nginx.conf", "-g", "daemon off;"]
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: http
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/carbonet/nginx.conf
          subPath: nginx.conf
          readOnly: true
        - name: react-app
          mountPath: /srv/react-app
          readOnly: true
        - name: tmp
          mountPath: /tmp
      terminationGracePeriodSeconds: 30
      volumes:
      - name: nginx-config
        configMap:
          name: carbonet-web-nginx
      - name: react-app
        hostPath:
          path: /opt/Resonance/projects/carbonet-frontend/src/main/resources/static/react-app
          type: Directory
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: carbonet-web
  namespace: carbonet-prod
  labels:
    app: carbonet-web
    project: carbonet
spec:
  type: NodePort
  selector:
    app: carbonet-web
  ports:
  - name: http
    port: 80
    targetPort: 8080
    nodePort: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: carbonet-web-pdb
  namespace: carbonet-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: carbonet-web
