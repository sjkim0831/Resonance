apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: carbonet-zero-downtime
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["deployments"]
  validations:
  - expression: >-
      !(object.metadata.namespace == 'carbonet-prod' &&
        object.metadata.name in ['carbonet-runtime', 'carbonet-web']) ||
      (has(object.spec.replicas) && object.spec.replicas >= 2)
    message: Carbonet runtime and Web deployments require at least two replicas.
  - expression: >-
      !(object.metadata.namespace == 'carbonet-prod' &&
        object.metadata.name in ['carbonet-runtime', 'carbonet-web']) ||
      (object.spec.strategy.type == 'RollingUpdate' &&
       string(object.spec.strategy.rollingUpdate.maxUnavailable) in ['0', '0%'] &&
       !(string(object.spec.strategy.rollingUpdate.maxSurge) in ['0', '0%']))
    message: Carbonet deployments require maxUnavailable=0 and a positive maxSurge.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: carbonet-zero-downtime
spec:
  policyName: carbonet-zero-downtime
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: carbonet-prod
