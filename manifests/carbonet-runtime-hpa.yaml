apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carbonet-runtime-hpa
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    framework: resonance
    project: carbonet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carbonet-runtime
  minReplicas: 2
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 90
