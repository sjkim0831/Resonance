---
apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
  labels:
    app: qdrant
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: qdrant
  labels:
    app: qdrant
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: 6333
      protocol: TCP
      name: api
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: grpc
  selector:
    app: qdrant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: qdrant
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.7.4
          ports:
            - containerPort: 6333
              name: api
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__SERVICE__MAX_REQUEST_SIZE_MB
              value: "32"
            - name: QDRANT__STORAGE__SNAPSHOT_TX_FAKE
              value: "true"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: qdrant-storage
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-nodeport
  namespace: qdrant
  labels:
    app: qdrant
spec:
  type: NodePort
  ports:
    - port: 6333
      targetPort: 6333
      nodePort: 30333
      protocol: TCP
      name: api
    - port: 6334
      targetPort: 6334
      nodePort: 30334
      protocol: TCP
      name: grpc
  selector:
    app: qdrant