<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>액터·프로세스·테스트 1차 설계 지도</title>
  <style>
    :root{--primary:#246beb;--navy:#052b57;--line:#d7e1ef;--bg:#f5f7fa;--text:#1d2733;--muted:#59697c;--danger:#d32f2f}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Pretendard GOV,Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select{font:inherit}.mast{background:#eef2f7;border-bottom:1px solid var(--line);padding:7px 24px;font-size:12px;color:var(--muted)}
    header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:18px 24px}.header-row{display:flex;align-items:center;gap:18px;justify-content:space-between;max-width:1800px;margin:auto}.title h1{font-size:24px;margin:0;color:var(--navy)}.title p{margin:5px 0 0;color:var(--muted);font-size:14px}.counts{display:flex;gap:8px;flex-wrap:wrap}.badge{background:#e9f1ff;color:#174ea6;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}
    main{max-width:1800px;margin:auto;padding:20px}.panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 16px #2038580b}.filters{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:10px;padding:16px}.filters input,.filters select{height:44px;border:1px solid #b8c5d6;border-radius:9px;background:#fff;padding:0 12px}.layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:16px;margin-top:16px}.process-list{max-height:calc(100vh - 220px);overflow:auto;padding:8px;position:sticky;top:150px}.process-button{display:block;width:100%;border:0;border-radius:9px;background:transparent;text-align:left;padding:11px;color:var(--text);cursor:pointer}.process-button:hover{background:#eef5ff}.process-button.active{background:var(--primary);color:#fff}.process-button small{display:block;opacity:.75;margin-top:3px}
    .content{min-width:0}.section{padding:20px;margin-bottom:16px}.section h2{margin:0 0 5px;color:var(--navy);font-size:20px}.meta{color:var(--muted);font-size:13px}.flow-wrap{overflow:auto;padding:15px 0 6px}.flow{display:flex;align-items:stretch;min-width:max-content;gap:26px}.node{position:relative;width:210px;min-height:128px;padding:14px;border:1px solid #b8cee9;border-radius:12px;background:#f8fbff}.node.PARTIAL,.node.NOT_IMPLEMENTED{border-color:#f0b429;background:#fff9e8}.node.UNRESOLVED{border-color:#e06a6a;background:#fff4f4}.node:not(:last-child):after{content:"→";position:absolute;right:-22px;top:46%;font-size:20px;color:var(--primary)}.node strong{display:block;color:var(--navy);line-height:1.35}.node code{display:block;margin-top:8px;color:#315273;font-size:11px}.node button{border:0;background:transparent;color:var(--primary);padding:8px 0 0;cursor:pointer;font-weight:800}.status{display:inline-block;margin-top:7px;border-radius:999px;background:#e7edf5;padding:3px 7px;font-size:10px;font-weight:900}
    .scenario-head{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}.pagination{display:flex;gap:6px;align-items:center}.pagination button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 10px;cursor:pointer}.pagination button:disabled{opacity:.4}.scenario{border-top:1px solid #e5ebf3;padding:11px 2px;display:grid;grid-template-columns:220px 130px minmax(520px,1fr) 100px;gap:12px;align-items:center;font-size:13px;overflow:auto}.scenario:first-child{border-top:0}.scenario code{overflow-wrap:anywhere}.scenario-flow{display:flex;align-items:center;gap:7px;min-width:max-content;white-space:nowrap}.flow-part{border:1px solid #cfdaea;background:#f8fbff;border-radius:8px;padding:7px 9px;max-width:330px;overflow:hidden;text-overflow:ellipsis}.flow-arrow{color:var(--primary);font-weight:900}.severity{font-weight:900}.severity.CRITICAL{color:var(--danger)}.empty{padding:50px;text-align:center;color:var(--muted)}.loading{min-height:70vh;display:grid;place-items:center;font-weight:800;color:var(--navy)}
    dialog{border:0;border-radius:16px;max-width:900px;width:calc(100% - 32px);padding:0;box-shadow:0 24px 80px #081a3344}dialog::backdrop{background:#081a3388}.dialog-head{display:flex;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}.dialog-body{padding:20px;max-height:70vh;overflow:auto}.close{border:0;background:#eef2f7;border-radius:8px;padding:8px 12px;cursor:pointer}pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#f5f7fa;padding:12px;border-radius:8px;font-size:12px}
    @media(max-width:1000px){.filters{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.process-list{position:static;max-height:240px}.scenario{grid-template-columns:1fr 1fr}.counts{display:none}}
    @media(max-width:600px){header,.mast,main{padding-left:12px;padding-right:12px}.filters{grid-template-columns:1fr}.scenario{grid-template-columns:1fr}.title h1{font-size:20px}}
  </style>
</head>
<body>
  <div class="mast">대한민국정부 공식 누리집 · Carbonet 설계 검토</div>
  <header><div class="header-row"><div class="title"><h1>액터·프로세스·테스트 1차 설계 지도</h1><p>현행 자산 전수 역추적 전의 전문 업무 기준선입니다. 전체 시스템 확정본이 아닙니다.</p></div><div class="counts" id="counts"></div></div></header>
  <main>
    <section class="panel" style="padding:16px;margin-bottom:16px;border-color:#f0b429;background:#fff9e8"><strong style="color:#7a4d00">전수조사·정합성 갱신 중</strong><p style="margin:6px 0 0;color:#624b22;font-size:14px">현재 메뉴 791개, 프론트 페이지 305개, Java 엔드포인트 후보 1,300개, DB 객체 232개를 수집했습니다. 연결 근거가 확정되지 않은 항목은 미확정으로 표시합니다.</p></section>
    <section class="panel filters">
      <select id="mode"><option value="CANONICAL">기개발 우선 정규 프로세스</option><option value="IMPLEMENTED">기개발 원본 전수조사</option><option value="DESIGN">전문 신규 설계 원본</option><option value="UNIFIED">원본 단순 합계 비교</option></select>
      <select id="domain"><option value="">전체 업무 영역</option></select>
      <select id="process"><option value="">전체 프로세스</option></select>
      <select id="actor"><option value="">전체 액터</option></select>
      <select id="caseType"><option value="">전체 시나리오 유형</option></select>
      <input id="query" type="search" placeholder="프로세스·단계·시나리오 검색">
    </section>
    <div id="app" class="loading">전체 실행 명세를 불러오는 중입니다.</div>
  </main>
  <dialog id="detail"><div class="dialog-head"><strong id="detailTitle"></strong><button class="close" onclick="detail.close()">닫기</button></div><div class="dialog-body" id="detailBody"></div></dialog>
  <script>
    const PAGE_SIZE=100,state={data:null,processCode:"",page:1};
    const $=id=>document.getElementById(id),esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    async function load(){
      const response=await fetch("./spec-data.json.gz",{cache:"no-store"});if(!response.ok)throw new Error(`명세 데이터 조회 실패 (${response.status})`);
      let text;if(typeof DecompressionStream!=="undefined"){text=await new Response(response.body.pipeThrough(new DecompressionStream("gzip"))).text()}else{throw new Error("이 브라우저는 압축 명세 해제를 지원하지 않습니다.")}
      state.data=JSON.parse(text);initialize();render();
    }
    function initialize(){const d=state.data,m=d.manifest.counts;
      const im=d.implementedModel?.stats||{},cm=d.canonicalModel?.stats||{};$("counts").innerHTML=[["정규 프로세스",cm.canonicalProcesses||0],["기개발 기반",cm.implementedProcesses||0],["신규 필요",cm.newRequiredProcesses||0],["정규 단계",cm.canonicalSteps||0],["정규 시나리오",(cm.canonicalScenarios||0).toLocaleString()]].map(x=>`<span class="badge">${x[0]} ${x[1]}</span>`).join("");
      fill("actor",(d.canonicalModel?.actors||d.actors).map(a=>[a.actorCode,a.actorName]));fill("caseType",[...new Set([...d.tests,...(d.implementedModel?.scenarioCandidates||[])].map(t=>t.caseType))]);refreshModelOptions();
      ["mode","domain","process","actor","caseType","query"].forEach(id=>$(id).addEventListener(id==="query"?"input":"change",()=>{state.page=1;if(id==="mode")refreshModelOptions();if(id==="process")state.processCode=$(id).value;render()}));
    }
    function fill(id,items){const el=$(id);for(const item of items){const o=document.createElement("option");o.value=Array.isArray(item)?item[0]:item;o.textContent=Array.isArray(item)?`${item[1]} (${item[0]})`:item;el.appendChild(o)}}
    function implementedProcesses(){const im=state.data.implementedModel;if(!im)return[];const roots=new Map(im.domains.map(x=>[x.menuCode,x])),caps=new Map(im.capabilities.map(x=>[x.menuCode,x]));return im.subprocesses.map(g=>{const list=g.capabilityCodes.map((code,i)=>{const c=caps.get(code),binding=c.bindings?.[0]||{},bp=c.screenBlueprints?.[0]||{};return{stepCode:c.menuCode,stepOrder:i+1,stepName:c.name,actorCode:binding.actor_code||"UNRESOLVED",fromState:i?`CAP_${i}_DONE`:"READY",toState:`CAP_${i+1}_DONE`,commandCode:`OPEN_${c.menuCode}`,screenCode:bp.page_id||c.url||"UNRESOLVED",apiCode:"UNRESOLVED",dataContracts:[],completionRules:["routeResolved","businessActionVerified","auditEvidenceProduced"],failureTransitions:["ROUTE_MISSING","AUTHORITY_DENIED","CONTRACT_MISSING"],rollbackCommand:`RETURN_${c.menuCode}`}});const actors=[...new Set(list.map(x=>x.actorCode).filter(x=>x!=="UNRESOLVED"))];return{processCode:g.menuCode,processName:g.name,domainCode:`${g.parentCode} ${roots.get(g.parentCode)?.name||""}`,ownerActorCode:actors.join(",")||"UNRESOLVED",legalSourceIds:["CURRENT_SYSTEM_IMPLEMENTATION_EVIDENCE"],steps:list}})}
    function modelProcesses(){const mode=$("mode").value,implemented=implementedProcesses(),canonical=state.data.canonicalModel?.processes||[];return mode==="CANONICAL"?canonical:mode==="DESIGN"?state.data.processes:mode==="IMPLEMENTED"?implemented:[...state.data.processes,...implemented]}
    function modelTests(){const mode=$("mode").value,implemented=state.data.implementedModel?.scenarioCandidates||[],canonical=state.data.canonicalModel?.tests||[];return mode==="CANONICAL"?canonical:mode==="DESIGN"?state.data.tests:mode==="IMPLEMENTED"?implemented:[...state.data.tests,...implemented]}
    function refreshModelOptions(){const list=modelProcesses(),domain=$("domain"),process=$("process");domain.innerHTML='<option value="">전체 업무 영역</option>';process.innerHTML='<option value="">전체 프로세스</option>';fill("domain",[...new Set(list.map(p=>p.domainCode))]);fill("process",list.map(p=>[p.processCode,p.processName]));state.processCode=""}
    function selectedProcesses(){const list=modelProcesses(),domain=$("domain").value,process=$("process").value,actor=$("actor").value,q=$("query").value.trim().toLowerCase();return list.filter(p=>(!domain||p.domainCode===domain)&&(!process||p.processCode===process)&&(!actor||p.ownerActorCode.split(',').includes(actor))&&(!q||`${p.processCode} ${p.processName} ${p.steps.map(s=>s.stepName).join(" ")}`.toLowerCase().includes(q)))}
    function selectedTests(processCodes){const typ=$("caseType").value,actor=$("actor").value,q=$("query").value.trim().toLowerCase(),set=new Set(processCodes),plist=modelProcesses();return modelTests().filter(t=>set.has(t.processCode)&&(!typ||t.caseType===typ)&&(!actor||plist.find(p=>p.processCode===t.processCode)?.ownerActorCode.split(',').includes(actor))&&(!q||JSON.stringify(t).toLowerCase().includes(q)))}
    function render(){const processes=selectedProcesses();if(!state.processCode||!processes.some(p=>p.processCode===state.processCode))state.processCode=processes[0]?.processCode||"";const current=processes.find(p=>p.processCode===state.processCode);const tests=selectedTests(processes.map(p=>p.processCode));
      if(!current){$("app").className="panel empty";$("app").textContent="조건에 맞는 프로세스가 없습니다.";return}
      $("app").className="layout";$("app").innerHTML=`<aside class="panel process-list">${processes.map(p=>`<button class="process-button ${p.processCode===current.processCode?'active':''}" data-process="${p.processCode}">${esc(p.processName)}<small>${p.processCode} · ${p.steps.length}단계</small></button>`).join("")}</aside><div class="content"><section class="panel section"><h2>${esc(current.processName)}</h2><p class="meta">${esc(current.modelType||'DESIGNED')} · ${current.processCode} · ${current.domainCode} · 담당 ${current.ownerActorCode} · 근거 ${esc((current.legalSourceIds||[current.source||'CURRENT_SYSTEM']).join(", "))}</p><div class="flow-wrap"><div class="flow">${current.steps.map(s=>`<article class="node ${s.implementationStatus||current.implementationStatus||''}"><strong>${s.stepOrder}. ${esc(s.stepName)}</strong><code>${s.fromState} → ${s.toState}</code><code>${s.screenCode}</code>${s.implementationStatus||current.implementationStatus?`<span class="status">${esc(s.implementationStatus||current.implementationStatus)}</span>`:''}<button data-step="${s.stepCode}">계약 상세</button></article>`).join("")}</div></div></section><section class="panel section"><div class="scenario-head"><div><h2>연결 테스트 시나리오</h2><p class="meta">현재 필터 결과 ${tests.length.toLocaleString()}건 · 100건씩 표시</p></div><div class="pagination" id="pagination"></div></div><div id="scenarioList"></div></section></div>`;
      document.querySelectorAll("[data-process]").forEach(b=>b.onclick=()=>{state.processCode=b.dataset.process;state.page=1;render()});document.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>showStep(current.steps.find(s=>s.stepCode===b.dataset.step)));
      renderTests(tests,current.processCode);
    }
    function renderTests(all,currentCode){const own=all.filter(t=>t.processCode===currentCode),pages=Math.max(1,Math.ceil(own.length/PAGE_SIZE));state.page=Math.min(state.page,pages);const rows=own.slice((state.page-1)*PAGE_SIZE,state.page*PAGE_SIZE);$("scenarioList").innerHTML=rows.length?rows.map(t=>{const when=t.when?.commandCode||t.when?.menuUrl||t.when?.apiCode||"업무 실행";return`<article class="scenario"><code>${esc(t.caseCode)}</code><div><strong>${esc(t.caseType)}</strong><br>${esc(t.variant)}</div><div class="scenario-flow"><span class="flow-part"><b>Given</b> ${esc((t.given||[]).join(" · "))}</span><span class="flow-arrow">→</span><span class="flow-part"><b>When</b> ${esc(when)}</span><span class="flow-arrow">→</span><span class="flow-part"><b>Then</b> ${esc((t.then||[]).join(" · "))}</span></div><button class="close severity ${t.severity}" data-case="${esc(t.caseCode)}">${esc(t.severity)}</button></article>`}).join(""):`<div class="empty">이 프로세스에 해당하는 시나리오가 없습니다.</div>`;
      $("pagination").innerHTML=`<button ${state.page<=1?'disabled':''} id="prev">이전</button><span>${state.page} / ${pages}</span><button ${state.page>=pages?'disabled':''} id="next">다음</button>`;$("prev").onclick=()=>{state.page--;renderTests(all,currentCode)};$("next").onclick=()=>{state.page++;renderTests(all,currentCode)};document.querySelectorAll("[data-case]").forEach(b=>b.onclick=()=>showCase(state.data.tests.find(t=>t.caseCode===b.dataset.case)));
    }
    function showStep(step){$("detailTitle").textContent=step.stepName;$("detailBody").innerHTML=`<pre>${esc(JSON.stringify(step,null,2))}</pre>`;$("detail").showModal()}
    function showCase(test){$("detailTitle").textContent=test.caseCode;$("detailBody").innerHTML=`<pre>${esc(JSON.stringify(test,null,2))}</pre>`;$("detail").showModal()}
    load().catch(e=>{$("app").className="panel empty";$("app").textContent=e.message});
  </script>
</body></html>
