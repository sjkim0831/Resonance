<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 관리 - 컴팩트 디자인 테스트 (드래그앤드롭)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Public+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Public Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    
    /* Drag and drop styles */
    .dragging { opacity: 0.5; background-color: #e0e7ff !important; }
    .drag-over { border-top: 3px solid #3b82f6 !important; }
    .drag-target { background-color: #f0f9ff !important; }
    
    /* Tree indentation */
    .tree-children { border-left: 2px dashed #cbd5e1; margin-left: 12px; }
    .tree-children.collapsed { display: none; }
    
    /* Smooth transitions */
    .tree-item { transition: background-color 0.15s, border-color 0.15s; }
    
    /* Hover effects */
    .tree-item:hover { background-color: #f8fafc; }
    
    /* Expand icon rotation */
    .expand-icon { transition: transform 0.2s; }
    .expand-icon.expanded { transform: rotate(0deg); }
    .expand-icon.collapsed { transform: rotate(-90deg); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-[1600px] mx-auto p-6">
    <!-- Header -->
    <div class="bg-white rounded-xl border shadow-sm mb-6">
      <div class="flex items-center justify-between px-6 py-4 border-b">
        <div>
          <h1 class="text-xl font-bold text-slate-800">메뉴 레지스트리 콘솔</h1>
          <p class="text-sm text-slate-500 mt-0.5">드래그앤드롭 + 접힌 트리 디자인 테스트</p>
        </div>
        <div class="flex items-center gap-3">
          <button id="expandAllBtn" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-slate-50 font-medium">
            전체 펼치기
          </button>
          <button id="collapseAllBtn" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-slate-50 font-medium">
            전체 접기
          </button>
          <button class="px-4 py-2 border rounded-lg font-medium hover:bg-slate-50">취소</button>
          <button id="saveBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">변경사항 저장</button>
        </div>
      </div>
    </div>

    <!-- Design Info Banner -->
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
      <div class="flex items-start gap-3">
        <span class="material-symbols-outlined text-blue-600 mt-0.5">info</span>
        <div>
          <h3 class="font-bold text-blue-800 mb-1">컴팩트 드래그앤드롭 디자인</h3>
          <p class="text-sm text-blue-700">
            메뉴 항목을 드래그하여 순서를 변경할 수 있습니다. 상위 메뉴를 클릭하면 자식 메뉴가 접히거나 펼쳐집니다.
          </p>
        </div>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-5 gap-4 mb-6">
      <div class="bg-white border rounded-lg p-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">전체 메뉴</div>
        <div class="text-2xl font-bold text-slate-800" id="totalCount">0</div>
      </div>
      <div class="bg-white border rounded-lg p-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">펼쳐진 메뉴</div>
        <div class="text-2xl font-bold text-blue-600" id="expandedCount">0</div>
      </div>
      <div class="bg-white border rounded-lg p-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">접힌 메뉴</div>
        <div class="text-2xl font-bold text-slate-600" id="collapsedCount">0</div>
      </div>
      <div class="bg-white border rounded-lg p-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">저장 대기</div>
        <div class="text-2xl font-bold text-amber-600" id="pendingCount">0</div>
      </div>
      <div class="bg-white border rounded-lg p-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">현재 레인</div>
        <div class="text-2xl font-bold text-slate-800">ADMIN</div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
        <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" placeholder="메뉴 코드, 이름, URL 검색...">
      </div>
      <button id="searchBtn" class="px-4 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">검색</button>
      <button id="resetBtn" class="px-4 py-2.5 border rounded-lg font-medium hover:bg-slate-50">초기화</button>
    </div>

    <!-- Code Legend -->
    <div class="flex items-center gap-6 mb-4 text-xs">
      <span class="text-slate-500 font-bold">레지스트리 유형:</span>
      <span class="inline-flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-blue-100 border border-blue-200"></span>
        <span class="text-slate-600">상위 (4자리)</span>
      </span>
      <span class="inline-flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-amber-50 border border-amber-200"></span>
        <span class="text-slate-600">그룹 (6자리)</span>
      </span>
      <span class="inline-flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-emerald-50 border border-emerald-200"></span>
        <span class="text-slate-600">페이지 (8자리)</span>
      </span>
      <span class="text-slate-400 ml-4">* 드래그하여 순서 변경 가능</span>
    </div>

    <!-- Menu Tree - Compact Design with Drag & Drop -->
    <div class="bg-white border rounded-xl overflow-hidden">
      <!-- Header -->
      <div class="bg-slate-100 border-b px-4 py-3 grid grid-cols-[40px_40px_1fr_120px_200px_100px_80px] gap-3 text-xs font-bold text-slate-500 uppercase tracking-wider">
        <div></div>
        <div></div>
        <div>메뉴명</div>
        <div>코드</div>
        <div>URL</div>
        <div>상태</div>
        <div>작업</div>
      </div>

      <!-- Tree Content -->
      <div id="menuTree" class="divide-y divide-slate-100">
        <!-- Content will be populated by JavaScript -->
      </div>
    </div>

    <!-- Action Bar -->
    <div class="flex items-center justify-between mt-6 pt-6 border-t">
      <div class="text-sm text-slate-500">
        * 드래그하여 메뉴 순서를 변경하고 "변경사항 저장"을 클릭하세요.
      </div>
      <div class="flex items-center gap-3">
        <button id="refreshBtn" class="px-6 py-2.5 border rounded-lg font-medium hover:bg-slate-50">
          <span class="material-symbols-outlined text-sm align-middle mr-1">refresh</span>
          새로고침
        </button>
        <button id="saveOrderBtn" class="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
          <span class="material-symbols-outlined text-sm align-middle mr-1">save</span>
          변경사항 저장
        </button>
      </div>
    </div>
  </div>

  <script>
    // Mock Menu Data
    const mockMenus = [
      {
        id: 'A001',
        code: 'A001',
        label: '시스템',
        icon: 'settings',
        url: '/admin/system',
        useAt: 'Y',
        sortOrdr: 1,
        expanded: true,
        children: [
          { id: 'A00101', code: 'A00101', label: '공통코드 조회', icon: 'manage_search', url: '/admin/system/code/list', useAt: 'Y', sortOrdr: 1, children: [] },
          { id: 'A00102', code: 'A00102', label: '공통코드 등록', icon: 'add_circle', url: '/admin/system/code/register', useAt: 'Y', sortOrdr: 2, children: [] },
          { id: 'A00103', code: 'A00103', label: '메뉴 관리', icon: 'account_tree', url: '/admin/system/menu', useAt: 'Y', sortOrdr: 3, children: [
            { id: 'A0010301', code: 'A0010301', label: '메뉴 그룹 관리', icon: 'folder', url: '/admin/system/menu/group', useAt: 'Y', sortOrdr: 1, children: [] },
            { id: 'A0010302', code: 'A0010302', label: '메뉴 아이템 관리', icon: 'list', url: '/admin/system/menu/item', useAt: 'Y', sortOrdr: 2, children: [] },
          ]},
          { id: 'A00104', code: 'A00104', label: '페이지 관리', icon: 'web_asset', url: '/admin/system/page', useAt: 'Y', sortOrdr: 4, children: [] },
          { id: 'A00105', code: 'A00105', label: '권한 관리', icon: 'admin_panel_settings', url: '/admin/system/auth', useAt: 'Y', sortOrdr: 5, children: [] },
        ]
      },
      {
        id: 'A002',
        code: 'A002',
        label: '게시판',
        icon: 'article',
        url: '/admin/board',
        useAt: 'Y',
        sortOrdr: 2,
        expanded: false,
        children: [
          { id: 'A00201', code: 'A00201', label: '공지사항', icon: 'campaign', url: '/admin/board/notice', useAt: 'Y', sortOrdr: 1, children: [] },
          { id: 'A00202', code: 'A00202', label: 'FAQ', icon: 'help', url: '/admin/board/faq', useAt: 'Y', sortOrdr: 2, children: [] },
          { id: 'A00203', code: 'A00203', label: 'QnA', icon: 'quiz', url: '/admin/board/qna', useAt: 'N', sortOrdr: 3, children: [] },
        ]
      },
      {
        id: 'A003',
        code: 'A003',
        label: '회원',
        icon: 'people',
        url: '/admin/member',
        useAt: 'Y',
        sortOrdr: 3,
        expanded: false,
        children: [
          { id: 'A00301', code: 'A00301', label: '회원 목록', icon: 'list', url: '/admin/member/list', useAt: 'Y', sortOrdr: 1, children: [] },
          { id: 'A00302', code: 'A00302', label: '회원 등록', icon: 'person_add', url: '/admin/member/register', useAt: 'Y', sortOrdr: 2, children: [] },
        ]
      },
      {
        id: 'A004',
        code: 'A004',
        label: '환경설정',
        icon: 'tune',
        url: '/admin/config',
        useAt: 'Y',
        sortOrdr: 4,
        expanded: false,
        children: [
          { id: 'A00401', code: 'A00401', label: '테마 설정', icon: 'palette', url: '/admin/config/theme', useAt: 'Y', sortOrdr: 1, children: [] },
          { id: 'A00402', code: 'A00402', label: '알림 설정', icon: 'notifications', url: '/admin/config/notify', useAt: 'Y', sortOrdr: 2, children: [] },
        ]
      },
    ];

    let draggedItem = null;
    let pendingChanges = new Set();

    // Get chip style based on code length
    function getChipStyle(code) {
      const depth = code.length;
      if (depth === 4) return { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200' };
      if (depth === 6) return { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200' };
      return { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200' };
    }

    // Render a single menu item
    function renderMenuItem(menu, depth = 0) {
      const hasChildren = menu.children && menu.children.length > 0;
      const isExpanded = menu.expanded !== false;
      const chipStyle = getChipStyle(menu.code);
      const indentPx = depth * 24;
      
      return `
        <div class="tree-item" 
             data-id="${menu.id}" 
             data-code="${menu.code}" 
             data-sort="${menu.sortOrdr}"
             draggable="true"
             style="padding-left: ${indentPx}px">
          <div class="flex items-center gap-2 px-4 py-2 hover:bg-slate-50 transition-colors">
            <!-- Expand/Collapse Button -->
            <button class="w-7 h-7 flex items-center justify-center rounded hover:bg-slate-200 toggle-expand" 
                    data-id="${menu.id}">
              ${hasChildren 
                ? `<span class="material-symbols-outlined text-sm text-slate-400 expand-icon ${isExpanded ? 'expanded' : 'collapsed'}">expand_more</span>`
                : `<span class="material-symbols-outlined text-sm text-slate-200">circle</span>`
              }
            </button>
            
            <!-- Drag Handle -->
            <span class="material-symbols-outlined text-base text-slate-300 cursor-grab drag-handle">drag_indicator</span>
            
            <!-- Icon -->
            <span class="material-symbols-outlined text-base text-slate-500">${menu.icon}</span>
            
            <!-- Label -->
            <span class="font-medium text-slate-800 min-w-[140px]">${menu.label}</span>
            
            <!-- Code Badge -->
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-mono font-bold border ${chipStyle.bg} ${chipStyle.text} ${chipStyle.border}">
              ${menu.code}
            </span>
            
            <!-- URL -->
            <span class="text-xs text-slate-400 truncate flex-1 min-w-0">${menu.url || '—'}</span>
            
            <!-- Status -->
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold ${menu.useAt === 'Y' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">
              ${menu.useAt === 'Y' ? '사용' : '미사용'}
            </span>
            
            <!-- Actions -->
            <div class="flex items-center gap-1">
              <button class="w-7 h-7 flex items-center justify-center rounded hover:bg-slate-200 text-slate-500 hover:text-slate-700" title="수정">
                <span class="material-symbols-outlined text-sm">edit</span>
              </button>
              <button class="w-7 h-7 flex items-center justify-center rounded hover:bg-red-100 text-slate-500 hover:text-red-600" title="삭제">
                <span class="material-symbols-outlined text-sm">delete</span>
              </button>
            </div>
          </div>
          
          <!-- Children -->
          ${hasChildren ? `
            <div class="tree-children ${isExpanded ? '' : 'collapsed'}" data-parent="${menu.id}">
              ${menu.children.map(child => renderMenuItem(child, depth + 1)).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    // Render the entire tree
    function renderTree() {
      const container = document.getElementById('menuTree');
      container.innerHTML = mockMenus.map(menu => renderMenuItem(menu, 0)).join('');
      updateStats();
      attachEventListeners();
    }

    // Update statistics
    function updateStats() {
      let total = 0;
      let expanded = 0;
      let collapsed = 0;
      
      function countItems(menus) {
        menus.forEach(menu => {
          total++;
          if (menu.expanded !== false && menu.children && menu.children.length > 0) {
            expanded++;
          } else if (menu.children && menu.children.length > 0) {
            collapsed++;
          }
          if (menu.children) countItems(menu.children);
        });
      }
      
      countItems(mockMenus);
      
      document.getElementById('totalCount').textContent = total;
      document.getElementById('expandedCount').textContent = expanded;
      document.getElementById('collapsedCount').textContent = collapsed;
      document.getElementById('pendingCount').textContent = pendingChanges.size;
    }

    // Toggle expand/collapse
    function toggleExpand(id) {
      function findAndToggle(menus) {
        for (let menu of menus) {
          if (menu.id === id) {
            menu.expanded = menu.expanded === false ? true : false;
            return true;
          }
          if (menu.children && findAndToggle(menu.children)) return true;
        }
        return false;
      }
      findAndToggle(mockMenus);
      renderTree();
    }

    // Expand all
    function expandAll() {
      function setExpanded(menus, value) {
        menus.forEach(menu => {
          menu.expanded = value;
          if (menu.children) setExpanded(menu.children, value);
        });
      }
      setExpanded(mockMenus, true);
      renderTree();
    }

    // Collapse all
    function collapseAll() {
      function setExpanded(menus, value) {
        menus.forEach(menu => {
          menu.expanded = value;
          if (menu.children) setExpanded(menu.children, value);
        });
      }
      setExpanded(mockMenus, false);
      renderTree();
    }

    // Attach event listeners
    function attachEventListeners() {
      // Toggle expand/collapse
      document.querySelectorAll('.toggle-expand').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          toggleExpand(id);
        });
      });

      // Drag and drop
      document.querySelectorAll('.tree-item[draggable="true"]').forEach(item => {
        item.addEventListener('dragstart', (e) => {
          draggedItem = item;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        item.addEventListener('dragend', (e) => {
          item.classList.remove('dragging');
          document.querySelectorAll('.tree-item').forEach(i => {
            i.classList.remove('drag-over', 'drag-target');
          });
          draggedItem = null;
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (item !== draggedItem) {
            item.classList.add('drag-target');
          }
        });

        item.addEventListener('dragleave', (e) => {
          item.classList.remove('drag-target');
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-target');
          
          if (draggedItem && item !== draggedItem) {
            // Get parent containers
            const draggedParent = draggedItem.closest('.tree-children');
            const targetParent = item.closest('.tree-children');
            
            // Simple reordering - in real app would need proper tree manipulation
            const draggedId = draggedItem.dataset.id;
            const targetId = item.dataset.id;
            
            // Find items in arrays
            function findAndMove(menus, targetId) {
              for (let i = 0; i < menus.length; i++) {
                if (menus[i].id === targetId) {
                  // Find dragged item's position
                  function findDragged(m) {
                    if (m.id === draggedId) return m;
                    if (m.children) {
                      for (let child of m.children) {
                        const found = findDragged(child);
                        if (found) return found;
                      }
                    }
                    return null;
                  }
                  
                  // Remove dragged from its current position
                  function removeDragged(menus, id) {
                    for (let i = 0; i < menus.length; i++) {
                      if (menus[i].id === id) {
                        return menus.splice(i, 1)[0];
                      }
                      if (menus[i].children) {
                        const found = removeDragged(menus[i].children, id);
                        if (found) return found;
                      }
                    }
                    return null;
                  }
                  
                  const draggedMenu = removeDragged(JSON.parse(JSON.stringify(mockMenus)), draggedId);
                  
                  // Insert after target
                  const targetIndex = menus.findIndex(m => m.id === targetId);
                  if (targetIndex !== -1) {
                    menus.splice(targetIndex + 1, 0, draggedMenu);
                    pendingChanges.add(draggedId);
                  }
                  return true;
                }
              }
              return false;
            }
            
            findAndMove(JSON.parse(JSON.stringify(mockMenus)), targetId);
            alert(`메뉴 순서 변경: ${draggedItem.querySelector('.font-medium').textContent}을(를) ${item.querySelector('.font-medium').textContent} 뒤로 이동`);
            pendingChanges.add(draggedId);
            renderTree();
          }
        });
      });
    }

    // Search functionality
    function searchMenus(keyword) {
      if (!keyword) {
        renderTree();
        return;
      }
      
      // Filter and expand parents
      function filterMenus(menus, kw) {
        return menus.filter(menu => {
          const matches = menu.label.toLowerCase().includes(kw) || 
                         menu.code.toLowerCase().includes(kw) ||
                         (menu.url && menu.url.toLowerCase().includes(kw));
          
          if (menu.children) {
            const filteredChildren = filterMenus(menu.children, kw);
            if (filteredChildren.length > 0) {
              menu.children = filteredChildren;
              menu.expanded = true;
              return true;
            }
          }
          
          return matches;
        });
      }
      
      const filtered = JSON.parse(JSON.stringify(mockMenus));
      const result = filterMenus(filtered, keyword.toLowerCase());
      
      const container = document.getElementById('menuTree');
      container.innerHTML = result.map(menu => renderMenuItem(menu, 0)).join('');
      updateStats();
      attachEventListeners();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderTree();
      
      // Expand/Collapse all buttons
      document.getElementById('expandAllBtn').addEventListener('click', expandAll);
      document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
      
      // Search
      document.getElementById('searchBtn').addEventListener('click', () => {
        searchMenus(document.getElementById('searchInput').value);
      });
      
      document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchMenus(e.target.value);
      });
      
      document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        renderTree();
      });
      
      // Refresh
      document.getElementById('refreshBtn').addEventListener('click', () => {
        renderTree();
      });
      
      // Save
      document.getElementById('saveBtn').addEventListener('click', () => {
        alert(`저장할 변경사항: ${pendingChanges.size}개\n${[...pendingChanges].join(', ')}`);
        pendingChanges.clear();
        updateStats();
      });
      
      document.getElementById('saveOrderBtn').addEventListener('click', () => {
        alert(`저장할 변경사항: ${pendingChanges.size}개\n${[...pendingChanges].join(', ')}`);
        pendingChanges.clear();
        updateStats();
      });
    });
  </script>
</body>
</html>
