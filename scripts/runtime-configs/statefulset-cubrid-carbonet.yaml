  creationTimestamp: "2026-06-16T14:20:29Z"
  generation: 20
  name: cubrid-carbonet
  namespace: carbonet-prod
  resourceVersion: "5520323"
  uid: 0d2d185b-5043-44cc-ac69-eaf2b08ec8c8
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: cubrid-carbonet
  serviceName: cubrid-carbonet
  template:
    metadata:
      labels:
        app: cubrid-carbonet
    spec:
      containers:
      - command:
        - sh
        - -c
        - |2

          echo "=== CUBRID 컨테이너 시작 ==="

          # databases.txt 권한 임시 완화
          chmod 644 /var/lib/cubrid/databases/databases.txt 2>/dev/null || true

          # CUBRID 환경 설정
          export CUBRID=/home/cubrid/CUBRID
          export PATH=$CUBRID/bin:$PATH
          export LD_LIBRARY_PATH=$CUBRID/lib:$LD_LIBRARY_PATH

          # CUBRID 서비스 시작
          echo "=== CUBRID 서비스 시작 ==="
          cubrid service start

          # サーバーが起動しない場合は手動で開始
          sleep 3
          cubrid server start carbonet 2>/dev/null || true
          cubrid broker start 2>/dev/null || true

          echo "=== CUBRID 서비스 상태 ==="
          cubrid service status

          # databases.txt保護 복원
          chmod 444 /var/lib/cubrid/databases/databases.txt 2>/dev/null || true

          # 永続化
          echo "carbonet /var/lib/cubrid/carbonet/databases carbonet localhost /var/lib/cubrid/carbonet/databases file:/var/lib/cubrid/carbonet/databases/lob" > /var/lib/cubrid/databases/databases.txt
          chmod 444 /var/lib/cubrid/databases/databases.txt

          # 待機
          echo "=== CUBRID 실행 완료, 대기 중 ==="
          tail -f /dev/null
        env:
        - name: CUBRID_DATABASES
          value: /var/lib/cubrid/databases
        image: docker.io/cubrid/cubrid:11.4
        imagePullPolicy: IfNotPresent
        name: cubrid
        ports:
        - containerPort: 33000
          protocol: TCP
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 250m
            memory: 1Gi
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /var/lib/cubrid
          name: cubrid-data
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - |2

          echo "=== CUBRID IPC 정리 및 databases.txt 생성 ==="
          date

          # directories作成
          mkdir -p /var/lib/cubrid/databases
          mkdir -p /var/lib/cubrid/carbonet/databases
          mkdir -p /var/lib/cubrid/carbonet/log
          mkdir -p /var/lib/cubrid/carbonet/databases/lob

          # 既存プロセス清理
          for pid in /proc/[0-9]*; do
            if [ -L "$pid/exe" ]; then
              target=$(readlink "$pid/exe" 2>/dev/null)
              if [[ "$target" == *cubrid* ]] || [[ "$target" == *entrypoint* ]]; then
                kill -9 $(basename $pid) 2>/dev/null &
              fi
            fi
          done

          # SHM清理
          for seg in $(ipcs -m 2>/dev/null | grep "0x0003" | awk '{print $2}'); do
            ipcrm -m $seg 2>/dev/null &
          done

          # Semaphore清理
          for sem in $(ipcs -s 2>/dev/null | grep "0x0003" | awk '{print $2}'); do
            ipcrm -s $sem 2>/dev/null &
          done

          wait

          # databases.txt生成
          echo "carbonet /var/lib/cubrid/carbonet/databases carbonet localhost /var/lib/cubrid/carbonet/databases file:/var/lib/cubrid/carbonet/databases/lob" > /var/lib/cubrid/databases/databases.txt
          chmod 644 /var/lib/cubrid/databases/databases.txt
          chown 1000:1000 /var/lib/cubrid/databases/databases.txt 2>/dev/null || true

          # ログファイルコピー
          cp /var/lib/cubrid/carbonet/log/*lg* /var/lib/cubrid/carbonet/databases/ 2>/dev/null || true

          echo "=== IPC清理完了, SHM 잔여: $(ipcs -m 2>/dev/null | grep -c '0x0003' || echo 0) ==="
          date
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: cleanup-cubrid-ipc
        resources: {}
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/cubrid
          name: cubrid-data
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 30
      volumes:
      - name: cubrid-data
        persistentVolumeClaim:
          claimName: cubrid-pvc
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
status:
  availableReplicas: 1
  collisionCount: 0
  currentReplicas: 1
  currentRevision: cubrid-carbonet-5b75864d46
  observedGeneration: 20
  readyReplicas: 1
  replicas: 1
  updateRevision: cubrid-carbonet-5b75864d46
  updatedReplicas: 1
