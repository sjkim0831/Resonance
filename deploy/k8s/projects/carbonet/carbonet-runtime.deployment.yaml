apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carbonet-runtime
  template:
    metadata:
      labels:
        app: carbonet-runtime
        framework: resonance
        project: carbonet
    spec:
      containers:
        - name: carbonet-runtime
          image: registry.local/carbonet-runtime:2026.04.26
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18081
          envFrom:
            - configMapRef:
                name: carbonet-runtime-config
            - secretRef:
                name: carbonet-runtime-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 18081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 18081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
spec:
  selector:
    app: carbonet-runtime
  ports:
    - name: http
      port: 80
      targetPort: 18081
  type: ClusterIP
