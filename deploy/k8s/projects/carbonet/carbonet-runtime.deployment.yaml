apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carbonet-runtime
  template:
    metadata:
      labels:
        app: carbonet-runtime
        framework: resonance
        project: carbonet
    spec:
      containers:
        - name: carbonet-runtime
          image: registry.local/carbonet-runtime:2026.05.06-ecoinvent-env-config
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 18081
          envFrom:
            - configMapRef:
                name: carbonet-runtime-config
            - secretRef:
                name: carbonet-runtime-secret
          env:
            - name: CARBONET_ECOINVENT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-ecoinvent-secret
                  key: CARBONET_ECOINVENT_CLIENT_ID
            - name: CARBONET_ECOINVENT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-ecoinvent-secret
                  key: CARBONET_ECOINVENT_CLIENT_SECRET
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
spec:
  selector:
    app: carbonet-runtime
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
