apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    framework: resonance
    project: carbonet
    tier: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carbonet-runtime
  template:
    metadata:
      labels:
        app: carbonet-runtime
        framework: resonance
        project: carbonet
        tier: dev
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: carbonet-runtime
          image: localhost:5000/carbonet-runtime:2026.06.14-023404-kubeadm
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "4"
              memory: "8Gi"
            requests:
              cpu: "500m"
              memory: "2Gi"
          envFrom:
            - configMapRef:
                name: carbonet-runtime-config
            - secretRef:
                name: carbonet-runtime-secret
          env:
            - name: CARBONET_ECOINVENT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-ecoinvent-secret
                  key: CARBONET_ECOINVENT_CLIENT_ID
            - name: CARBONET_ECOINVENT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-ecoinvent-secret
                  key: CARBONET_ECOINVENT_CLIENT_SECRET
            - name: TOKEN_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-secret
                  key: TOKEN_ACCESS_SECRET
            - name: TOKEN_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbonet-runtime-secret
                  key: TOKEN_REFRESH_SECRET
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=30 -XX:MaxRAMPercentage=50 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: carbonet-runtime
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    tier: dev
spec:
  type: NodePort
  selector:
    app: carbonet-runtime
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 80