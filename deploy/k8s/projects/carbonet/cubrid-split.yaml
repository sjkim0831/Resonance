---
apiVersion: v1
kind: Service
metadata:
  name: cubrid-carbonet
  namespace: carbonet-prod
  labels:
    app: cubrid-carbonet
    framework: resonance
    project: carbonet
spec:
  selector:
    app: cubrid-carbonet
  ports:
    - name: broker
      port: 33000
      targetPort: 33000
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cubrid-carbonet
  namespace: carbonet-prod
  labels:
    app: cubrid-carbonet
    framework: resonance
    project: carbonet
spec:
  serviceName: cubrid-carbonet
  replicas: 1
  selector:
    matchLabels:
      app: cubrid-carbonet
  template:
    metadata:
      labels:
        app: cubrid-carbonet
        framework: resonance
        project: carbonet
    spec:
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - cubrid-carbonet
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: cubrid
          image: cubrid/cubrid:11.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: broker
              containerPort: 33000
          env:
            - name: CUBRID_DB
              value: "carbonet"
            - name: CUBRID_COMPONENTS
              value: "ALL"
            - name: CUBRID_VOLUME_SIZE
              value: "512M"
            - name: CUBRID_LOCALE
              value: "ko_KR.utf8"
            - name: CUBRID_DB_HOST
              value: "cubrid-carbonet-0"
          volumeMounts:
            - name: cubrid-data
              mountPath: /var/lib/cubrid
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 1800
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 180
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: cubrid-data
          hostPath:
            path: /opt/Resonance/data/cubrid
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cubrid-broker
  namespace: carbonet-prod
  labels:
    app: cubrid-broker
    framework: resonance
    project: carbonet
spec:
  replicas: 5
  selector:
    matchLabels:
      app: cubrid-broker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 60
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: cubrid-broker
        framework: resonance
        project: carbonet
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 600
      priorityClassName: system-cluster-critical
      dnsPolicy: ClusterFirst
      hostIPC: false
      hostPID: false
      hostNetwork: false
      shareProcessNamespace: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cubrid-broker
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cubrid-broker
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cubrid-broker
                topologyKey: kubernetes.io/hostname
      tolerations:
        - operator: Exists
      containers:
        - name: broker
          image: cubrid/cubrid:11.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
          ports:
            - name: broker
              containerPort: 33000
              protocol: TCP
          env:
            - name: CUBRID_DB
              value: "carbonet"
            - name: CUBRID_COMPONENTS
              value: "BROKER"
            - name: CUBRID_LOCALE
              value: "ko_KR.utf8"
            - name: CUBRID_DB_HOST
              value: "cubrid-carbonet-0.cubrid-carbonet"
            - name: CUBRID_BROKER_PORT
              value: "33000"
            - name: CUBRID_APPL_SERVER_SHM_ID
              value: "65001"
            - name: CUBRID_LOG_DIR
              value: "/home/cubrid/CUBRID/log"
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 30
          volumeMounts:
            - name: cubrid-conf
              mountPath: /home/cubrid/CUBRID/conf
            - name: cubrid-log
              mountPath: /home/cubrid/CUBRID/log
            - name: dshm
              mountPath: /dev/shm
            - name: dshm-extra
              mountPath: /dev/shm2
          readinessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120
            successThreshold: 1
          livenessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
            successThreshold: 1
          startupProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 180
            successThreshold: 1
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: cubrid-conf
          hostPath:
            path: /opt/Resonance/data/cubrid/conf
            type: DirectoryOrCreate
        - name: cubrid-log
          hostPath:
            path: /opt/Resonance/data/cubrid/log
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: dshm-extra
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cubrid-carbonet-pdb
  namespace: carbonet-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cubrid-carbonet
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cubrid-broker-pdb
  namespace: carbonet-prod
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: cubrid-broker
---
apiVersion: v1
kind: Service
metadata:
  name: cubrid-broker
  namespace: carbonet-prod
  labels:
    app: cubrid-broker
    framework: resonance
    project: carbonet
spec:
  selector:
    app: cubrid-broker
  ports:
    - name: broker
      port: 33000
      targetPort: 33000
  type: ClusterIP