apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cubrid-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /opt/Resonance/data/cubrid
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - ccus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cubrid-pvc
  namespace: carbonet-prod
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-storage
---
apiVersion: v1
kind: Service
metadata:
  name: cubrid-carbonet
  namespace: carbonet-prod
  labels:
    app: cubrid-carbonet
    framework: resonance
    project: carbonet
spec:
  selector:
    app: cubrid-carbonet
  ports:
    - name: broker
      port: 33000
      targetPort: 33000
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cubrid-carbonet
  namespace: carbonet-prod
  labels:
    app: cubrid-carbonet
    framework: resonance
    project: carbonet
spec:
  serviceName: cubrid-carbonet
  replicas: 1
  selector:
    matchLabels:
      app: cubrid-carbonet
  template:
    metadata:
      labels:
        app: cubrid-carbonet
        framework: resonance
        project: carbonet
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-paths
          image: busybox:1.36
          command: ["sh", "-c", "sleep 5 && sed -i 's|/opt/Resonance/data/cubrid|/var/lib/cubrid|g' /var/lib/cubrid/databases.txt && sed -i 's|localhost|127.0.0.1|g' /var/lib/cubrid/databases.txt && cat /var/lib/cubrid/databases.txt"]
          volumeMounts:
            - name: cubrid-data
              mountPath: /var/lib/cubrid
      containers:
        - name: cubrid
          image: docker.io/cubrid/cubrid:11.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: broker
              containerPort: 33000
              hostPort: 33000
          env:
            - name: CUBRID_DB
              value: "carbonet"
            - name: CUBRID_COMPONENTS
              value: "ALL"
            - name: CUBRID_VOLUME_SIZE
              value: "512M"
            - name: CUBRID_LOCALE
              value: "ko_KR.utf8"
            - name: CUBRID_DB_HOST
              value: "cubrid-carbonet-0"
          volumeMounts:
            - name: cubrid-data
              mountPath: /var/lib/cubrid
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 1800
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: 33000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 180
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: cubrid-data
          persistentVolumeClaim:
            claimName: cubrid-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
