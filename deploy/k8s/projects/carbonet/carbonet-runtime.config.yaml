apiVersion: v1
kind: ConfigMap
metadata:
  name: carbonet-runtime-config
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    framework: resonance
    project: carbonet
data:
  PROJECT_ID: "carbonet"
  SERVER_PORT: "18081"
  POSTGRES_HOST: "postgresql.carbonet-prod.svc.cluster.local"
  LOG_DIR: "/tmp"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql.carbonet-prod.svc.cluster.local:5432/carbonet?charset=UTF-8"
  SPRING_PROFILES_ACTIVE: "prod"
  APP_PROJECT_ID: "carbonet"
  RESONANCE_RUNTIME_MODE: "isolated"
  RESONANCE_FRAMEWORK: "resonance"
  RESONANCE_PROJECT: "carbonet"
  CARBONET_MENU_EMISSION_ECOINVENT_CODE: "A0020113"
  CARBONET_MENU_EMISSION_ECOINVENT_NAME_KO: "ecoinvent 배출계수 관리"
  CARBONET_MENU_EMISSION_ECOINVENT_NAME_EN: "ecoinvent Emission Factors"
  CARBONET_MENU_EMISSION_ECOINVENT_URL: "/admin/emission/ecoinvent"
  CARBONET_MENU_EMISSION_ECOINVENT_ICON: "settings_input_composite"
  CARBONET_ECOINVENT_SEARCH_URL_TEMPLATE: "https://api.ecoinvent.org/v0/datasets?query=__QUERY__&from=0&limit=100&version=latest&system_model=cutoff"
  CARBONET_ECOINVENT_INDICATOR_IDS: "1542"
  CARBONET_REACT_APP_FS_OVERRIDE_ENABLED: "true"
  CARBONET_REACT_APP_FS_OVERRIDE_PATH: "/app/react-app-overlay"
  CARBONET_STATIC_FS_OVERRIDE_ENABLED: "true"
  CARBONET_STATIC_FS_OVERRIDE_PATH: "/app/static-overlay"
  CARBONET_BACKEND_METADATA_FS_OVERRIDE_PATH: "/app/backend-metadata"
  CARBONET_AI_RECOMMENDATION_ENABLED: "false"
  CARBONET_AI_OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  CARBONET_AI_OLLAMA_MODEL: "qwen3:0.6b"
