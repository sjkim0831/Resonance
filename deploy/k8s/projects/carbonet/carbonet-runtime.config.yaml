apiVersion: v1
kind: ConfigMap
metadata:
  name: carbonet-runtime-config
  namespace: carbonet-prod
  labels:
    app: carbonet-runtime
    framework: resonance
    project: carbonet
data:
  PROJECT_ID: "carbonet"
  SERVER_PORT: "18081"
  CUBRID_HOST: "cubrid-carbonet.carbonet-prod.svc.cluster.local"
  LOG_DIR: "/tmp"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "cubrid.jdbc.driver.CUBRIDDriver"
  SPRING_DATASOURCE_URL: "jdbc:cubrid:cubrid-carbonet.carbonet-prod.svc.cluster.local:33000:carbonet:::?charset=UTF-8"
  SPRING_PROFILES_ACTIVE: "prod"
  APP_PROJECT_ID: "carbonet"
  RESONANCE_RUNTIME_MODE: "isolated"
  RESONANCE_FRAMEWORK: "resonance"
  RESONANCE_PROJECT: "carbonet"
  CARBONET_MENU_EMISSION_ECOINVENT_CODE: "A0020113"
  CARBONET_MENU_EMISSION_ECOINVENT_NAME_KO: "ecoinvent 배출계수 관리"
  CARBONET_MENU_EMISSION_ECOINVENT_NAME_EN: "ecoinvent Emission Factors"
  CARBONET_MENU_EMISSION_ECOINVENT_URL: "/admin/emission/ecoinvent"
  CARBONET_MENU_EMISSION_ECOINVENT_ICON: "settings_input_composite"
  CARBONET_ECOINVENT_SEARCH_URL_TEMPLATE: "https://api.ecoinvent.org/v0/datasets?query=__QUERY__&from=0&limit=100&version=latest&system_model=cutoff"
