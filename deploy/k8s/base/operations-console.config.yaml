apiVersion: v1
kind: ConfigMap
metadata:
  name: operations-console-config
  namespace: resonance-ops
  labels:
    app: operations-console
    framework: resonance
    tier: control-plane
data:
  SERVER_PORT: "18000"
  CUBRID_HOST: "cubrid-carbonet.carbonet-prod.svc.cluster.local"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "cubrid.jdbc.driver.CUBRIDDriver"
  SPRING_DATASOURCE_URL: "jdbc:cubrid:cubrid-carbonet.carbonet-prod.svc.cluster.local:33000:carbonet:::?charset=UTF-8"
  LOG_DIR: "/tmp"
  SECURITY_CODEX_ENABLED: "false"
  SECURITY_CODEX_RUNNER_ENABLED: "false"
