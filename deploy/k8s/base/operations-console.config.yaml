apiVersion: v1
kind: ConfigMap
metadata:
  name: operations-console-config
  namespace: resonance-ops
  labels:
    app: operations-console
    framework: resonance
    tier: control-plane
data:
  SERVER_PORT: "18000"
  POSTGRES_HOST: "postgresql.carbonet-prod.svc.cluster.local"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql.carbonet-prod.svc.cluster.local:5432/carbonet?charset=UTF-8"
  LOG_DIR: "/tmp"
  SECURITY_CODEX_ENABLED: "false"
  SECURITY_CODEX_RUNNER_ENABLED: "false"
